<!DOCTYPE html>
<html>
<head>
  <title>My Epic Screen Recorder 😱🔥</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
      padding: 25px;
    }

    button, select {
      padding: 10px 15px;
      margin: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    #startBtn { background: #22c55e; color: white; }
    #stopBtn { background: #ef4444; color: white; }

    video {
      margin-top: 20px;
      width: 80%;
      max-width: 700px;
      border-radius: 10px;
      background: black;
    }

    #timer {
      font-size: 18px;
      margin-top: 10px;
      color: #60a5fa;
    }
  </style>
</head>

<body>

  <h1>Epic Screen Recorder</h1>

  <select id="quality">
    <option value="high">High Quality ❌</option>
    <option value="low">Low Quality ✅</option>
  </select>

  <label>
    <input type="checkbox" id="mic">
    Microphone
  </label>

  <br>

  <button id="startBtn">Start Recording</button>
  <button id="stopBtn" disabled>Stop Recording</button>

  <div id="timer">00:00</div>

  <video id="video" controls></video>

  <a id="downloadLink"></a>

  <script>
    let mediaRecorder;
    let chunks = [];
    let timerInterval;
    let seconds = 0;

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const video = document.getElementById("video");
    const downloadLink = document.getElementById("downloadLink");
    const timer = document.getElementById("timer");

    function formatTime(s) {
      const m = String(Math.floor(s / 60)).padStart(2, "0");
      const sec = String(s % 60).padStart(2, "0");
      return `${m}:${sec}`;
    }

    startBtn.onclick = async () => {

      const quality = document.getElementById("quality").value;
      const micOn = document.getElementById("mic").checked;

      let audioStream = null;

      if (micOn) {
        audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      }

      const screenStream = await navigator.mediaDevices.getDisplayMedia({
        video: true,
        audio: false
      });

      const tracks = [
        ...screenStream.getVideoTracks()
      ];

      if (audioStream) {
        tracks.push(...audioStream.getAudioTracks());
      }

      const stream = new MediaStream(tracks);

      video.srcObject = screenStream;

      chunks = [];

      let options = {};

      if (quality === "low") {
        options = {
          mimeType: "video/webm",
          videoBitsPerSecond: 500000
        };
      } else {
        options = {
          mimeType: "video/webm",
          videoBitsPerSecond: 8000000
        };
      }

      mediaRecorder = new MediaRecorder(stream, options);

      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) chunks.push(e.data);
      };

      mediaRecorder.onstop = () => {
        const blob = new Blob(chunks, { type: "video/webm" });
        const url = URL.createObjectURL(blob);

        video.srcObject = null;
        video.src = url;

        downloadLink.href = url;
        downloadLink.download = "recording.webm";
        downloadLink.textContent = "Download Video";
      };

      mediaRecorder.start();

      // TIMER
      seconds = 0;
      timer.innerText = "00:00";

      timerInterval = setInterval(() => {
        seconds++;
        timer.innerText = formatTime(seconds);
      }, 1000);

      startBtn.disabled = true;
      stopBtn.disabled = false;
    };

    stopBtn.onclick = () => {

      mediaRecorder.stop();

      clearInterval(timerInterval);
      timer.innerText = "00:00";

      startBtn.disabled = false;
      stopBtn.disabled = true;
    };
  </script>

</body>
</html>
